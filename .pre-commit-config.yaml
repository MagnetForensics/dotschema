exclude: '(^|/)(bin|obj|\.git)/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: "^charts/.*/templates/"
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: jb-cleanupcode
        name: jb cleanupcode
        entry: 'dotnet tool run jb cleanupcode --profile="Built-in: Full Cleanup" DotSchema.sln'
        language: system
        pass_filenames: false
        types_or: [c#]
